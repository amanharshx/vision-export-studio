name: Update Homebrew Cask

run-name: >
  Update Homebrew Cask • ${{ github.event.release.tag_name }} • ${{ github.actor }}

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: update-homebrew-cask
  cancel-in-progress: false

jobs:
  update-cask:
    name: Update tap cask
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-22.04

    steps:
      - name: Extract version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Preparing cask update for $TAG (version=$VERSION)"

      - name: Download DMGs + compute SHA256
        id: sums
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          import sys
          import time

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["TAG"]
          version = os.environ["VERSION"]

          want_arm_re = re.compile(rf"_{re.escape(version)}_aarch64\.dmg$")
          want_x64_re = re.compile(rf"_{re.escape(version)}_(x64|x86_64)\.dmg$")

          def sha256_file(path: str) -> str:
            h = hashlib.sha256()
            with open(path, "rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                h.update(chunk)
            return h.hexdigest()

          def curl_download(url: str, dest: str) -> None:
            subprocess.check_call(
              [
                "curl",
                "-fL",
                "--retry",
                "6",
                "--retry-delay",
                "10",
                "--retry-all-errors",
                "-o",
                dest,
                url,
              ]
            )

          arm_url = None
          x64_url = None

          # Poll release assets because uploads can lag behind "published" event.
          for attempt in range(1, 41):  # ~10 min
            raw = subprocess.check_output(
              ["gh", "api", f"repos/{repo}/releases/tags/{tag}"], text=True
            )
            data = json.loads(raw)
            assets = data.get("assets", [])

            for a in assets:
              name = a.get("name", "")
              url = a.get("browser_download_url", "")
              if not url:
                continue
              if arm_url is None and want_arm_re.search(name):
                arm_url = url
              if x64_url is None and want_x64_re.search(name):
                x64_url = url

            if arm_url and x64_url:
              break

            print(
              f"Assets not ready yet (attempt {attempt}/40). Waiting 15s...",
              file=sys.stderr,
            )
            time.sleep(15)

          if not arm_url or not x64_url:
            print(
              f"Missing assets for tag={tag} version={version}. arm_url={arm_url} x64_url={x64_url}",
              file=sys.stderr,
            )
            sys.exit(1)

          print(f"Downloading ARM DMG: {arm_url}")
          curl_download(arm_url, "aarch64.dmg")

          print(f"Downloading x64 DMG: {x64_url}")
          curl_download(x64_url, "x64.dmg")

          if os.path.getsize("aarch64.dmg") <= 0 or os.path.getsize("x64.dmg") <= 0:
            print("Downloaded DMG is empty", file=sys.stderr)
            sys.exit(1)

          sha_arm = sha256_file("aarch64.dmg")
          sha_x64 = sha256_file("x64.dmg")

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as f:
            f.write(f"sha_arm={sha_arm}\n")
            f.write(f"sha_intel={sha_x64}\n")

          print(f"ARM SHA256:   {sha_arm}")
          print(f"Intel SHA256: {sha_x64}")
          PY

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: amanharshx/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap
          fetch-depth: 0

      - name: Update Cask file (surgical replace)
        shell: bash
        run: |
          set -euo pipefail

          TAP_DIR="homebrew-tap"
          CASK_PATH="${TAP_DIR}/Casks/yolo-export-studio.rb"

          VERSION="${{ steps.meta.outputs.version }}"
          SHA_ARM="${{ steps.sums.outputs.sha_arm }}"
          SHA_INTEL="${{ steps.sums.outputs.sha_intel }}"

          test -f "$CASK_PATH"

          sed -i \
            -e "s/^  version \".*\"$/  version \"${VERSION}\"/" \
            "$CASK_PATH"

          sed -i \
            -e "s/^  sha256 arm:   \".*\",$/  sha256 arm:   \"${SHA_ARM}\",/" \
            -e "s/^         intel: \".*\"$/         intel: \"${SHA_INTEL}\"/" \
            "$CASK_PATH"

          echo "Updated ${CASK_PATH}:"
          grep -nE '^  version |^  sha256 |^         intel:' "$CASK_PATH" || true

      - name: Commit & push
        shell: bash
        run: |
          set -euo pipefail
          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes detected. Exiting."
            exit 0
          fi

          git add Casks/yolo-export-studio.rb
          git commit -m "Update yolo-export-studio to v${{ steps.meta.outputs.version }}"
          git push
